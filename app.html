<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#00a0e4" />
<title>Ouxe Marketing - Gestão Completa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTERADO) */
:root { --azul-ouxe: #00a0e4; --azul-ouxe-dark: #0073cf; --verde: #16a34a; --fundo: #eef3f8; --radius: 18px; }
body { background: var(--fundo); font-family: "Segoe UI", sans-serif; padding-bottom: 40px; }
.hidden { display: none !important; }

.app-header {
  background: linear-gradient(135deg, var(--azul-ouxe) 0%, var(--azul-ouxe-dark) 100%);
  color: white; padding: 20px 10px; border-radius: 0 0 25px 25px; text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;
}
.nav-top { display: flex; justify-content: center; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
.nav-btn {
  background: rgba(255,255,255,0.2); border: none; color: white;
  padding: 8px 15px; border-radius: 20px; font-weight: 600; font-size: 0.9rem;
}
.nav-btn.active { background: white; color: var(--azul-ouxe-dark); }
</style>
</head>

<body>

<div class="app-header">
  <h4 class="mb-0">Ouxe Marketing</h4>
  <div class="nav-top">
    <button class="nav-btn active">Vendas</button>
    <button class="nav-btn">Produtos</button>
    <button class="nav-btn">Clientes</button>

    <!-- BOTÃO INSTALAR -->
    <button id="installBtn" class="nav-btn" style="display:none;">Instalar App</button>
  </div>
</div>

<div class="text-center mt-5">
  <h5>Sistema carregado com sucesso ✅</h5>
  <p>Seu app já pode ser instalado</p>
</div>

<script>
/* =========================
   BOTÃO INSTALAR APP
========================= */
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'inline-block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

/* =========================
   MANIFEST EMBUTIDO
========================= */
const manifest = {
  name: "Ouxe Marketing",
  short_name: "Ouxe",
  start_url: ".",
  display: "standalone",
  background_color: "#eef3f8",
  theme_color: "#00a0e4",
  icons: []
};

const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);

const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);

/* =========================
   SERVICE WORKER EMBUTIDO
========================= */
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open('ouxe-cache').then(cache => {
          return cache.addAll(['./']);
        })
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(response => {
          return response || fetch(e.request);
        })
      );
    });
  `;

  const swBlob = new Blob([swCode], { type: 'text/javascript' });
  const swURL = URL.createObjectURL(swBlob);

  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
