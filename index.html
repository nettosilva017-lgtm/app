<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criador de Mídia com Texto Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #25D366;
      --primary-dark: #128C7E;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --card-bg: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      padding: 24px 16px;
      color: var(--text-main);
      min-height: 100vh;
    }
    .app-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    h2 {
      text-align: center;
      margin: 0 0 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #25D366, #128C7E);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.6rem;
    }
    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .full-width { grid-column: span 2; }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    input[type="file"], input[type="text"], select, input[type="range"], input[type="color"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      background: #fafafa;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
    }
    .range-wrap { display: flex; align-items: center; gap: 10px; }
    .range-wrap span { min-width: 32px; text-align: right; font-weight: bold; font-size: 0.9rem; }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      margin-top: 10px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #e9ecef; color: #495057; }
    .btn-secondary:hover { background: #dee2e6; }

    /* Área de Pré-visualização */
    #preview-wrapper {
      position: relative;
      width: 100%;
      margin: 20px 0;
      background: #f8f9fa;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      border: 2px dashed var(--border);
    }
    #preview-wrapper.has-content { border-style: solid; border-color: var(--primary-dark); background: #fff; }
    #preview-image {
      max-width: 100%;
      max-height: 450px;
      display: block;
    }
    #text-overlay {
      position: absolute;
      font-weight: 700;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
      background: rgba(0,0,0,0.35);
      padding: 6px 14px;
      border-radius: 8px;
      white-space: pre-wrap;
      text-align: center;
      pointer-events: none;
      transition: all 0.25s ease;
      line-height: 1.2;
    }

    /* Posições */
    .pos-top { top: 12px; left: 50%; transform: translateX(-50%); }
    .pos-bottom { bottom: 12px; left: 50%; transform: translateX(-50%); }
    .pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .pos-diagonal { top: 18%; left: 18%; transform: rotate(-10deg); }

    /* Espaços Publicitários */
    .ad-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .ad-box {
      background: linear-gradient(135deg, #fff3cd, #ffeaa7);
      border: 1px solid #fde68a;
      border-radius: 10px;
      height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.75rem;
      color: #856404;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      padding: 8px;
    }
    .ad-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(149, 119, 28, 0.2);
      background: linear-gradient(135deg, #ffeaa7, #fde68a);
    }
    .ad-box span { font-weight: bold; margin-bottom: 4px; display: block; }

    .note { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 12px; line-height: 1.4; }
    @media (max-width: 480px) {
      .control-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      .ad-section { grid-template-columns: 1fr; }
      .ad-box { height: 60px; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <h2>✨ Editor de Mídia com Texto</h2>

  <div class="control-grid">
    <div class="full-width">
      <label for="imageInput">📁 Upload de Imagem ou GIF</label>
      <input type="file" id="imageInput" accept="image/*,.gif">
    </div>

    <div class="full-width">
      <label for="textInput">💬 Digite sua frase</label>
      <input type="text" id="textInput" placeholder="Ex: Promoção imperdível! 🔥">
    </div>

    <div>
      <label for="fontSelect">🔤 Tipo de Letra</label>
      <select id="fontSelect">
        <option value="Segoe UI, sans-serif">Padrão (Clean)</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Courier New', monospace">Courier</option>
        <option value="Impact, sans-serif">Impact</option>
        <option value="'Comic Sans MS', cursive">Comic Sans</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
      </select>
    </div>

    <div>
      <label for="sizeRange">📏 Tamanho</label>
      <div class="range-wrap">
        <input type="range" id="sizeRange" min="12" max="72" value="24">
        <span id="sizeVal">24px</span>
      </div>
    </div>

    <div>
      <label for="colorPicker">🎨 Cor do Texto</label>
      <input type="color" id="colorPicker" value="#ffffff">
    </div>

    <div>
      <label for="positionSelect">📍 Posição</label>
      <select id="positionSelect">
        <option value="pos-bottom">Abaixo</option>
        <option value="pos-top">Acima</option>
        <option value="pos-center">Centro</option>
        <option value="pos-diagonal">Diagonal</option>
      </select>
    </div>
  </div>

  <div id="preview-wrapper">
    <img id="preview-image" src="" alt="Pré-visualização">
    <div id="text-overlay" class="pos-bottom">Sua frase aqui</div>
  </div>

  <button class="btn btn-primary" onclick="shareWhatsApp()">📱 Enviar para WhatsApp</button>
  <button class="btn btn-secondary" onclick="downloadImage()">💾 Baixar Imagem</button>
  <p class="note">* GIFs animados serão salvos como PNG estático na exportação. Compartilhamento direto funciona melhor em celulares.</p>

  <!-- 3 Quadrinhos Publicitários -->
  <div class="ad-section">
    <div class="ad-box">
      <span>📢 Publicidade 1</span>
      Seu anúncio aqui
    </div>
    <div class="ad-box">
      <span>🛍️ Publicidade 2</span>
      Ofertas exclusivas
    </div>
    <div class="ad-box">
      <span>🔗 Publicidade 3</span>
      Clique e saiba mais
    </div>
  </div>
</div>

<script>
  const imageInput = document.getElementById('imageInput');
  const textInput = document.getElementById('textInput');
  const fontSelect = document.getElementById('fontSelect');
  const sizeRange = document.getElementById('sizeRange');
  const sizeVal = document.getElementById('sizeVal');
  const colorPicker = document.getElementById('colorPicker');
  const positionSelect = document.getElementById('positionSelect');
  const previewImage = document.getElementById('preview-image');
  const textOverlay = document.getElementById('text-overlay');
  const previewWrapper = document.getElementById('preview-wrapper');

  // Carrega imagem/GIF
  imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      previewImage.src = URL.createObjectURL(file);
      previewWrapper.classList.add('has-content');
    }
  });

  // Atualiza preview em tempo real
  function updatePreview() {
    // Texto e Posição
    textOverlay.textContent = textInput.value || 'Sua frase aqui';
    textOverlay.className = positionSelect.value;
    
    // Estilo
    textOverlay.style.fontFamily = fontSelect.value;
    textOverlay.style.fontSize = sizeRange.value + 'px';
    textOverlay.style.color = colorPicker.value;
    
    sizeVal.textContent = sizeRange.value + 'px';
  }

  textInput.addEventListener('input', updatePreview);
  fontSelect.addEventListener('change', updatePreview);
  sizeRange.addEventListener('input', updatePreview);
  colorPicker.addEventListener('input', updatePreview);
  positionSelect.addEventListener('change', updatePreview);
  updatePreview();

  // Prepara canvas para exportação
  async function prepareCanvas() {
    if (!previewImage.src) throw new Error('Nenhuma imagem carregada.');
    
    const originalBg = previewWrapper.style.background;
    const originalBorder = previewWrapper.style.border;
    previewWrapper.style.background = 'transparent';
    previewWrapper.style.border = 'none';
    
    const canvas = await html2canvas(previewWrapper, {
      useCORS: true,
      scale: 2,
      backgroundColor: null,
      logging: false
    });
    
    previewWrapper.style.background = originalBg;
    previewWrapper.style.border = originalBorder;
    return canvas;
  }

  // Baixar imagem
  async function downloadImage() {
    try {
      const canvas = await prepareCanvas();
      const link = document.createElement('a');
      link.download = 'midia_personalizada.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (err) {
      alert('Erro ao baixar: ' + err.message);
    }
  }

  // Compartilhar no WhatsApp
  async function shareWhatsApp() {
    if (!previewImage.src) {
      alert('Por favor, carregue uma imagem ou GIF primeiro.');
      return;
    }

    if (navigator.share) {
      try {
        const canvas = await prepareCanvas();
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const file = new File([blob], 'midia_whatsapp.png', { type: 'image/png' });
        
        await navigator.share({
          files: [file],
          title: 'Imagem Personalizada',
          text: textInput.value || ''
        });
      } catch (err) {
        if (err.name !== 'AbortError') {
          alert('Compartilhamento falhou. Baixando para envio manual...');
          downloadImage();
        }
      }
    } else {
      alert('Navegador não suporta compartilhamento direto. Imagem baixada para envio manual.');
      downloadImage();
    }
  }
</script>

</body>
</html>
